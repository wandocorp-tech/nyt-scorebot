name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test:
    name: Test (E2E)
    needs: build
    uses: ./.github/workflows/test.yml
    secrets:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

  release:
    name: Release
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      models: read
    uses: ./.github/workflows/release.yml
    with:
      version: v${{ github.run_number }}

  deploy:
    name: Deploy
    needs: release
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    secrets:
      PI_SSH_KEY: ${{ secrets.PI_SSH_KEY }}
      PI_HOST: ${{ secrets.PI_HOST }}
      PI_USER: ${{ secrets.PI_USER }}
      PI_SSH_PORT: ${{ secrets.PI_SSH_PORT }}
      PI_DEPLOY_PATH: ${{ secrets.PI_DEPLOY_PATH }}
      PI_SERVICE_NAME: ${{ secrets.PI_SERVICE_NAME }}
      TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
      TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}

  announce:
    name: Announce
    needs: deploy
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/announce.yml
    with:
      version: v${{ github.run_number }}
      release_url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ github.run_number }}
    secrets:
      DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
