name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR artifact
        id: download
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: release-staging
        continue-on-error: true

      - name: Set up Java 17 (fallback)
        if: steps.download.outcome == 'failure'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR (fallback)
        if: steps.download.outcome == 'failure'
        run: |
          mvn clean package -DskipTests --batch-mode --no-transfer-progress
          mkdir -p release-staging
          cp nyt-scorebot-app/target/nyt-scorebot-app-*.jar release-staging/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: release-staging/nyt-scorebot-app-*.jar
