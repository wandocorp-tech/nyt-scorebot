name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JAR artifact
        id: download
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: release-staging
        continue-on-error: true

      - name: Set up Java 17 (fallback)
        if: steps.download.outcome == 'failure'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR (fallback)
        if: steps.download.outcome == 'failure'
        run: |
          mvn clean package -DskipTests --batch-mode --no-transfer-progress
          mkdir -p release-staging
          cp nyt-scorebot-app/target/nyt-scorebot-app-*.jar release-staging/

      # Collect commits since the previous tag (or last 50 if no prior tag exists).
      # Output is the raw commit subject lines, one per line, ready for the model.
      - name: Collect commits since last release
        id: commits
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            echo "Using commits since tag: $PREV_TAG"
            git log --no-merges --pretty=format:'- %s' "${PREV_TAG}..HEAD" > commits.txt
          else
            echo "No previous tag found; using last 50 commits"
            git log --no-merges --pretty=format:'- %s' -n 50 > commits.txt
          fi
          echo "--- Commits to summarise ---"
          cat commits.txt
          echo "----------------------------"

      # Call GitHub Models to summarise commits into release notes.
      # Authenticated with the workflow's GITHUB_TOKEN (requires `models: read`).
      - name: Generate release notes via GitHub Models
        id: ai_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          SYSTEM_PROMPT='You are a release-notes assistant for the nyt-scorebot Discord bot. Summarise the commits provided by the user into concise, user-facing release notes for a Discord audience. Rules: (1) Output a markdown bullet list only — no preamble, no headings, no closing remarks. (2) Group related changes when sensible. (3) Skip commits prefixed with chore:, ci:, test:, or build: unless they have user-visible impact. (4) Rephrase commit subjects to be readable, not just copied. (5) Never invent features that are not in the commits. (6) Keep total output under 1500 characters. (7) Use plain language a player would understand.'
          USER_PROMPT="Summarise these commits as release notes for $VERSION:\n\n$(cat commits.txt)"

          PAYLOAD=$(jq -n \
            --arg sys "$SYSTEM_PROMPT" \
            --arg usr "$USER_PROMPT" \
            '{
              model: "openai/gpt-4o-mini",
              messages: [
                {role: "system", content: $sys},
                {role: "user",   content: $usr}
              ],
              temperature: 0.3,
              max_tokens: 600
            }')

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "https://models.github.ai/inference/chat/completions" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "GitHub Models call failed with HTTP $HTTP_CODE"
            cat response.json
            exit 1
          fi

          jq -r '.choices[0].message.content' response.json > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Model returned empty content"
            cat response.json
            exit 1
          fi
          echo "--- Generated release notes ---"
          cat release-notes.md
          echo "-------------------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: false
          body_path: release-notes.md
          files: release-staging/nyt-scorebot-app-*.jar
