name: Test (E2E)

on:
  workflow_call:
    secrets:
      DISCORD_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run end-to-end test
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: mvn test -Dtest=com.wandocorp.nytscorebot.EndToEndTest -pl nyt-scorebot-app -am --batch-mode --no-transfer-progress
