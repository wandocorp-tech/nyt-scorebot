name: Build

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: false
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run unit tests
        run: mvn verify -Dtest='!com.wandocorp.nytscorebot.EndToEndTest' --batch-mode --no-transfer-progress

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.organization=wandocorp-tech \
            -Dsonar.projectKey=wandocorp-tech_nyt-scorebot \
            -Dsonar.host.url=https://sonarcloud.io \
            --batch-mode --no-transfer-progress
        if: env.SONAR_TOKEN != ''

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: nyt-scorebot-app/target/nyt-scorebot-app-*.jar
          retention-days: 7
