name: Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run unit tests
        run: mvn verify -Dtest='!com.wandocorp.nytscorebot.EndToEndTest' --batch-mode --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: nyt-scorebot-app/target/nyt-scorebot-app-1.0-SNAPSHOT.jar
          retention-days: 7
