# Discord bot token from https://discord.com/developers/applications
discord.token=${DISCORD_TOKEN}

# Channels to monitor - each maps a Discord channel ID to a person's display name and Discord user ID
discord.channels[0].id=${DISCORD_CHANNEL_0_ID:1358111788146622709}
discord.channels[0].name=${DISCORD_CHANNEL_0_NAME:Will}
discord.channels[0].user-id=${DISCORD_CHANNEL_0_USER_ID:426857331242958848}

discord.channels[1].id=${DISCORD_CHANNEL_1_ID:1358112255857787191}
discord.channels[1].name=${DISCORD_CHANNEL_1_NAME:Conor}
discord.channels[1].user-id=${DISCORD_CHANNEL_1_USER_ID:239919221373534209}

discord.statusChannelId=${DISCORD_STATUS_CHANNEL_ID:1486455495991496734}
discord.resultsChannelId=${DISCORD_RESULTS_CHANNEL_ID:1358112345821286400}

# H2 file-based datasource
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/scorebot}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA / Hibernate — Flyway manages schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate

# Flyway — baseline existing databases at V1 so the baseline migration is skipped
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Actuator — expose only health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Timezone for puzzle date resolution (default: Europe/London)
discord.timezone=${DISCORD_TIMEZONE:Europe/London}
