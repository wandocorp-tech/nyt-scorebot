# Separate H2 file so E2E tests never touch the production or smoke test DB
spring.datasource.url=jdbc:h2:file:./data/scorebot-e2e-test
spring.jpa.hibernate.ddl-auto=create-drop

# Don't block the test thread waiting for Discord disconnect
discord.block-until-disconnect=false

discord.token=${DISCORD_TOKEN}

